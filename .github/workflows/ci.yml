name: CI

# Phase 4 status (2026-05-12): workflow disabled hasta Phase 5+ por dos razones:
#   1. El founder está recibiendo spam masivo de failure emails (Gmail al 100%
#      de cuota). CI corre en cada push y la mayoría falla por:
#      - Falta de Supabase Secrets reales en GitHub Settings
#      - typecheck no termina por OOM en runners gratuitos
#      - tests pueden necesitar config adicional
#   2. La validación local con pnpm typecheck + pnpm test + biome lint cubre
#      lo crítico mientras el founder es el único developer.
#
# Re-habilitar en Phase 5+ cuando:
#   - Configuremos Supabase Secrets en repo settings
#   - Ajustemos memory limits para typecheck
#   - Tengamos contribuidores externos que requieran CI guard
#
# Por ahora: solo manual desde Actions tab → Run workflow.
on:
  workflow_dispatch:

# Cancelar runs anteriores del mismo branch al hacer push nuevo
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '10.33.4'

jobs:
  setup:
    name: Install & cache
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Turborepo build artifacts
        uses: actions/cache@v5
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

  lint:
    name: Lint & format
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Biome format check
        run: pnpm format:check
      - name: Biome lint
        run: pnpm lint

  typecheck:
    name: TypeScript
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: actions/cache@v5
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-
      - run: pnpm typecheck

  test:
    name: Unit tests
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: actions/cache@v5
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-
      - run: pnpm test

  build:
    name: Build
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: actions/cache@v5
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-
      # Placeholder env vars para que `next build` no falle si algún Server
      # Component intenta inicializar el cliente Supabase durante static
      # generation. Son URLs válidas pero apuntan a un proyecto inexistente —
      # safe porque CI no hace requests reales, solo verifica que el bundle
      # compila. Para validation real con backend, usar GitHub Secrets.
      - name: Build (con placeholder Supabase env)
        run: pnpm build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder-ci.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-anon-key
      - name: Check Next.js bundle budget
        run: |
          echo "Build complete. Verify First Load JS in build output."

  status:
    name: CI status
    needs: [lint, typecheck, test, build]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify all jobs passed
        run: |
          if [ "${{ needs.lint.result }}" != "success" ] || \
             [ "${{ needs.typecheck.result }}" != "success" ] || \
             [ "${{ needs.test.result }}" != "success" ] || \
             [ "${{ needs.build.result }}" != "success" ]; then
            echo "::error::One or more CI jobs failed"
            exit 1
          fi
          echo "✅ All CI jobs passed"
