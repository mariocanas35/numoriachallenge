# Numoria Challenge — Supabase project config
# https://supabase.com/docs/guides/local-development/cli/config
#
# Cloud-first setup: la mayoría de configuración (auth, OAuth providers,
# email templates, storage buckets, etc.) se gestiona desde el Dashboard:
# https://supabase.com/dashboard/project/biqxblpfgagzsjsflnhh/settings
#
# Este archivo se usa principalmente para vincular el monorepo al proyecto
# cloud (`supabase link`) y aplicar migraciones (`supabase db push`).

# Project ref (apunta a numoria-challenge-dev en Supabase Cloud, region us-east-1)
project_id = "biqxblpfgagzsjsflnhh"

[api]
# Schemas expuestos vía REST API
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]

[db]
# Versión major de Postgres (debe coincidir con la del proyecto cloud)
major_version = 17
