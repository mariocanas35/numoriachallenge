<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 280" role="img" aria-labelledby="title desc">
  <title id="title">Rectángulo de 10 cm por 6 cm con un cuadrado de 4 cm de lado en su interior</title>
  <desc id="desc">Diagrama de geometría: rectángulo exterior con dimensiones 10 cm de largo y 6 cm de ancho, conteniendo un cuadrado de 4 cm de lado. No dibujado a escala.</desc>

  <!-- Rectángulo exterior 10 cm × 6 cm -->
  <rect x="60" y="50" width="320" height="180" fill="#FFF7ED" stroke="#F97316" stroke-width="3" rx="3"/>

  <!-- Cuadrado interior 4 cm × 4 cm -->
  <rect x="90" y="80" width="100" height="100" fill="#14B8A6" fill-opacity="0.18" stroke="#1E1B4B" stroke-width="2.5" rx="3"/>

  <!-- Dimensión superior: 10 cm -->
  <g stroke="#1F2937" stroke-width="1" fill="none">
    <line x1="60" y1="32" x2="380" y2="32"/>
    <line x1="60" y1="26" x2="60" y2="38"/>
    <line x1="380" y1="26" x2="380" y2="38"/>
  </g>
  <text x="220" y="23" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, 'Plus Jakarta Sans', sans-serif" font-size="14" font-weight="700" fill="#1F2937">10 cm</text>

  <!-- Dimensión derecha: 6 cm -->
  <g stroke="#1F2937" stroke-width="1" fill="none">
    <line x1="400" y1="50" x2="400" y2="230"/>
    <line x1="394" y1="50" x2="406" y2="50"/>
    <line x1="394" y1="230" x2="406" y2="230"/>
  </g>
  <text x="411" y="144" text-anchor="start" font-family="ui-sans-serif, system-ui, -apple-system, 'Plus Jakarta Sans', sans-serif" font-size="14" font-weight="700" fill="#1F2937">6 cm</text>

  <!-- Etiqueta del cuadrado: 4 cm -->
  <text x="140" y="136" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, 'Plus Jakarta Sans', sans-serif" font-size="13" font-weight="700" fill="#1E1B4B">4 cm</text>

  <!-- Nota visual decorativa: hatching sutil en el área "no cubierta" para insinuar el área a calcular -->
  <defs>
    <pattern id="hatch" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#F97316" stroke-width="0.6" stroke-opacity="0.35"/>
    </pattern>
    <!-- Mask: full rect área menos el cuadrado interior -->
    <mask id="hatch-mask">
      <rect x="60" y="50" width="320" height="180" fill="white"/>
      <rect x="90" y="80" width="100" height="100" fill="black"/>
    </mask>
  </defs>
  <rect x="60" y="50" width="320" height="180" fill="url(#hatch)" mask="url(#hatch-mask)" pointer-events="none"/>
</svg>
