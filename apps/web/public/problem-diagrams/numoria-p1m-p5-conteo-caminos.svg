<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 280" role="img" aria-labelledby="t5 d5">
  <title id="t5">Cuadrícula 3x3 con punto inicial A y final B</title>
  <desc id="d5">Cuadrícula 3 por 3. Punto A en la esquina inferior izquierda, punto B en la esquina superior derecha. Solo movimientos hacia arriba o hacia la derecha.</desc>
  <!-- Grid 3x3 lines (4 horizontales, 4 verticales) -->
  <g stroke="#94A3B8" stroke-width="1.5" fill="none">
    <!-- Horizontales -->
    <line x1="80" y1="60" x2="320" y2="60"/>
    <line x1="80" y1="140" x2="320" y2="140"/>
    <line x1="80" y1="220" x2="320" y2="220"/>
    <line x1="80" y1="220" x2="320" y2="220"/>
    <!-- Verticales -->
    <line x1="80" y1="60" x2="80" y2="220"/>
    <line x1="160" y1="60" x2="160" y2="220"/>
    <line x1="240" y1="60" x2="240" y2="220"/>
    <line x1="320" y1="60" x2="320" y2="220"/>
  </g>
  <!-- Punto A (inicio, esquina inferior izquierda) -->
  <circle cx="80" cy="220" r="8" fill="#F97316"/>
  <text x="65" y="248" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="16" font-weight="700" fill="#F97316">A</text>
  <!-- Punto B (final, esquina superior derecha) -->
  <circle cx="320" cy="60" r="8" fill="#14B8A6"/>
  <text x="335" y="52" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="16" font-weight="700" fill="#14B8A6">B</text>
  <!-- Flecha indicando dirección permitida (arriba) -->
  <g stroke="#1E1B4B" stroke-width="1.5" fill="#1E1B4B">
    <line x1="40" y1="180" x2="40" y2="100" stroke-linecap="round"/>
    <polygon points="36,108 44,108 40,100"/>
  </g>
  <text x="40" y="92" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#1E1B4B">arriba</text>
  <!-- Flecha indicando dirección permitida (derecha) -->
  <g stroke="#1E1B4B" stroke-width="1.5" fill="#1E1B4B">
    <line x1="200" y1="250" x2="280" y2="250" stroke-linecap="round"/>
    <polygon points="272,246 272,254 280,250"/>
  </g>
  <text x="240" y="270" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#1E1B4B">derecha</text>
</svg>
